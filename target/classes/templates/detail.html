<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - JAVA CORE SHOP'">商品詳情</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        /* 右下角優雅小提示框 */
        #toast-notification {
            visibility: hidden;
            min-width: 200px;
            background-color: #111827;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px 24px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s ease, bottom 0.3s ease;
        }
        #toast-notification.show {
            visibility: visible;
            opacity: 1;
            bottom: 30px;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

	<nav class="bg-white shadow h-16 flex justify-between items-center px-8 sticky top-0 z-50 mb-10">
	    <a th:href="@{/}" class="text-xl font-black text-gray-950 tracking-wider">🛒 JAVA CORE SHOP</a>
	    
	    <div class="flex-grow"></div> 

		<div class="flex items-center space-x-6">
		        <div th:if="${session.currentUser == null}">
		            <a th:href="@{/login}" class="text-sm font-bold bg-gray-950 text-white px-4 py-2 rounded-xl hover:bg-gray-800 transition-colors">會員登入</a>
		        </div>
		        
		        <div th:if="${session.currentUser != null}" class="flex items-center space-x-5">
		            <span class="text-sm text-gray-600">👋 <strong th:text="${session.currentUser.username}">使用者</strong></span>
		            
		            <a th:href="@{/product/add}" class="text-sm text-purple-600 hover:text-purple-800 font-bold transition-colors">➕ 上架商品</a>
		            <a th:href="@{/product/manage}" class="text-sm text-gray-600 hover:text-black font-bold transition-colors">⚙️ 商品管理</a>
		            
		            <a th:href="@{/seller/orders}" class="text-sm text-amber-600 hover:text-amber-800 font-bold transition-colors">📦 銷售訂單管理</a>
		            
		            <a th:href="@{/favorites}" class="text-sm font-bold text-pink-600 hover:text-pink-800 transition-colors">❤️ 我的收藏</a>
		            
		            <a th:href="@{/cart}" class="text-sm font-bold text-blue-600 hover:text-blue-800">
		                🛒 購物車(<span id="cart-count" th:text="${session.cart != null && !session.cart.isEmpty() ? #aggregates.sum(session.cart.![quantity]) : 0}">0</span>)
		            </a>
		            
		            <a th:href="@{/orders}" class="text-sm font-bold text-green-600 hover:text-green-800">📦 我的訂單明細</a>
		            <a th:href="@{/logout}" class="text-sm font-bold text-red-500 hover:text-red-700">登出</a>
		        </div>
		    </div>
		</nav>

    <main class="max-w-4xl w-full mx-auto px-6 pb-20 flex-grow">
        
        <section class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="rounded-2xl overflow-hidden bg-gray-100 flex items-center justify-center h-80">
                <img th:src="${product.imageUrl}" alt="商品圖片" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" th:classappend="${!product.active} ? 'grayscale' : ''">
            </div>
            
            <div class="space-y-4 flex flex-col justify-center">
                <div class="flex items-center space-x-2">
                    <h1 class="text-3xl font-black text-gray-950" th:text="${product.name}">商品名稱</h1>
                    <span th:if="${!product.active}" class="bg-red-100 text-red-600 text-xs font-bold px-2.5 py-1 rounded-md">已下架</span>
                </div>
                <p class="text-gray-500 leading-relaxed" th:text="${product.description}">商品描述...</p>
                
                <div class="py-2">
                    <p class="text-2xl font-black text-blue-600" th:text="'NT$ ' + ${product.price}">價格</p>
                    <p class="text-sm text-gray-400 mt-1">目前庫存數量: <span class="font-bold text-gray-600" th:text="${product.stock}">0</span></p>
                </div>

                <div class="pt-4 mt-auto space-y-3">
                    
                    <div th:if="${!product.active}" 
                         class="w-full bg-red-50 text-red-500 py-3.5 rounded-xl font-bold text-center border border-red-100 cursor-not-allowed">
                        🛑 此商品已下架暫不販售
                    </div>

                    <button th:if="${product.active && product.stock > 0}" 
                            type="button" 
                            th:onclick="'addToCart(event, ' + ${product.id} + ')'" 
                            id="cartBtn"
                            class="w-full bg-black text-white py-3.5 rounded-xl font-bold hover:bg-gray-800 transition-all shadow-md">
                        加入購物車
                    </button>
                    
                    <div th:if="${product.active && product.stock <= 0}" 
                         class="w-full bg-gray-200 text-gray-500 py-3.5 rounded-xl font-bold text-center cursor-not-allowed">
                        🚫 目前補貨中
                    </div>

                    <div th:if="${session.currentUser != null}">
                        <form th:if="${!isFavorited}" th:action="@{/favorite/add}" method="POST">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <button type="submit" class="w-full border-2 border-gray-200 text-gray-700 py-3.5 rounded-xl hover:bg-gray-50 hover:border-gray-300 font-bold transition-all flex items-center justify-center space-x-2">
                                <span>❤️ 加入收藏清單</span>
                            </button>
                        </form>

                        <form th:if="${isFavorited}" th:action="@{/favorite/remove}" method="POST">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <button type="submit" class="w-full bg-pink-50 text-pink-600 border-2 border-pink-200 py-3.5 rounded-xl hover:bg-pink-100 font-bold transition-all flex items-center justify-center space-x-2">
                                <span>💔 取消收藏</span>
                            </button>
                        </form>
                    </div>

                    <div th:if="${session.currentUser != null && product.sellerId == session.currentUser.id}" class="pt-2 border-t border-gray-100">
                        <a th:href="@{/product/edit/{id}(id=${product.id})}" 
                           class="w-full block text-center bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md">
                            ✏️ 修改商品資訊
                        </a>
                    </div>

                </div>
            </div>
        </section>

		<section class="mt-12 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
		    <h2 class="text-xl font-black mb-8 border-b pb-4 text-gray-800">💬 買家評價分享</h2>
		    
		    <div class="space-y-6 mb-10">
		        <div th:if="${#lists.isEmpty(reviews)}" class="text-center text-gray-400 py-4 text-sm">
		            尚無評價，成為第一個分享心得的人吧！
		        </div>
		        <div th:each="review : ${reviews}" class="border-b border-gray-50 pb-6 last:border-0">
		            <div class="flex justify-between items-center mb-2">
		                <p class="font-bold text-sm text-gray-900" 
		                   th:text="${review.anonymous != null && review.anonymous} ? '👤 匿名買家' : ${review.user.username}">使用者</p>
		                <p class="text-yellow-500 text-sm font-bold tracking-widest">
		                    <span th:if="${review.rating != null}" th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
		                </p>
		            </div>
		            <p class="text-gray-600 text-sm leading-relaxed" th:text="${review.content}">評論內容...</p>
		        </div>
		    </div>

		    <div th:if="${session.currentUser != null && hasPurchased && !hasReviewed}" 
		         class="bg-gray-50 p-6 rounded-2xl border border-gray-100">
		        <form th:action="@{/product/review}" method="POST" class="space-y-4">
		            <input type="hidden" name="productId" th:value="${product.id}">
		            
		            <div class="flex justify-between items-center mb-2">
		                <p class="font-bold text-sm text-gray-800">撰寫您的評價</p>
		                <div class="flex items-center space-x-4">
		                    <label class="inline-flex items-center text-xs text-gray-500 cursor-pointer">
		                        <input type="checkbox" name="anonymous" value="true" class="rounded border-gray-300 mr-1 text-gray-900">
		                        隱藏我的名字 (匿名)
		                    </label>
		                    <select name="rating" class="p-2 border border-gray-200 rounded-lg text-sm bg-white">
		                        <option value="5">★★★★★ 非常滿意</option>
		                        <option value="4">★★★★ 滿意</option>
		                        <option value="3">★★★ 普通</option>
		                        <option value="2">★★ 待改進</option>
		                        <option value="1">★ 極度失望</option>
		                    </select>
		                </div>
		            </div>
		            
		            <textarea name="content" required placeholder="分享您的心得..." 
		                      class="w-full p-4 border border-gray-200 rounded-xl text-sm h-24 focus:ring-2 focus:ring-gray-200"></textarea>
		            
		            <div class="text-right">
		                <button type="submit" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-gray-700">送出評價</button>
		            </div>
		        </form>
		    </div>
		    
		    <div th:if="${session.currentUser != null && !hasPurchased}" 
		         class="p-6 bg-yellow-50 rounded-2xl text-center border border-yellow-100 text-sm text-yellow-700">
		        🔒 本商品僅限「曾購買過此商品」的買家發表評論。
		    </div>

		    <div th:if="${session.currentUser != null && hasPurchased && hasReviewed}" 
		         class="p-6 bg-gray-50 rounded-2xl text-center border border-gray-100 text-sm text-gray-500">
		        🎉 您已發表過評價，感謝您的分享！
		    </div>
		    
		    <div th:if="${session.currentUser == null}" class="p-6 bg-gray-50 rounded-2xl text-center border border-gray-100">
		        <p class="text-sm text-gray-500">想分享看法嗎？請先 <a th:href="@{/login}" class="text-blue-600 font-bold hover:underline">登入帳號</a>。</p>
		    </div>
		</section>
        
    </main>

    <div id="toast-notification">🛒 已成功加入購物車！</div>

    <script>
        function addToCart(event, productId) {
            if(event) event.preventDefault();

            const btn = document.getElementById('cartBtn');
            const originalText = btn.innerText;
            btn.innerText = "處理中...";
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-wait');

            fetch('/cart/add?productId=' + productId, {
                method: 'POST'
            })
            .then(response => response.text())
            .then(data => {
                const result = String(data).trim().replace(/"/g, '');

                if (result === 'NEED_LOGIN') {
                    window.location.href = '/login';
                } 
                else if (result.includes('SUCCESS')) {
                    const match = result.match(/\d+/);
                    const newCount = match ? match[0] : '1';
                    
                    const cartCountBadge = document.getElementById('cart-count');
                    if (cartCountBadge) {
                        cartCountBadge.innerText = newCount;
                        cartCountBadge.classList.add('text-red-500', 'scale-125');
                        setTimeout(() => cartCountBadge.classList.remove('text-red-500', 'scale-125'), 300);
                    }

                    const toast = document.getElementById('toast-notification');
                    toast.classList.add('show');
                    
                    setTimeout(() => { 
                        toast.classList.remove('show'); 
                    }, 2500);
                } 
                else {
                    alert("❌ 操作失敗，可能商品庫存不足！回傳值：" + result);
                }
            })
            .catch(error => {
                console.error('API Error:', error);
                alert("伺服器連線異常，請稍後再試。");
            })
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-wait');
            });
        }
    </script>
</body>
</html>
