<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品上架 - 賣家後台</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-white shadow h-16 flex justify-between items-center px-8">
        <span class="text-xl font-bold text-gray-800">🛒 賣家管理後台</span>
        <div class="space-x-6">
            <a th:href="@{/}" class="text-gray-600 hover:text-gray-900 font-bold">返回商品首頁</a>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-xl w-full bg-white border border-gray-200 p-8 rounded-2xl shadow-sm">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-900">📦 全新商品上架</h2>
                <p class="text-gray-500 text-sm mt-1">填寫下方資訊，將商品發佈至商城</p>
            </div>

            <form th:action="@{/product/add}" th:object="${product}" method="POST" class="space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">商品名稱</label>
                    <input type="text" th:field="*{name}" required placeholder="例如：極簡工藝奢華檯燈"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">商品簡介 / 描述</label>
                    <textarea th:field="*{description}" rows="3" placeholder="請輸入商品的核心特色與規格細節..."
                              class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">售價 (NT$)</label>
                        <input type="number" th:field="*{price}" required min="1" placeholder="1500"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">初始上架庫存</label>
                        <input type="number" th:field="*{stock}" required min="1" placeholder="50"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">商品圖片 URL (可選)</label>
                    <input type="url" th:field="*{imageUrl}" placeholder="https://images.unsplash.com/... (留空將使用預設圖)"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-green-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-green-700 transition-colors shadow-sm mt-4">
                    確認上架
                </button>
            </form>

        </div>
    </div>

</body>
</html>
