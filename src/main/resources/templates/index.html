<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>質感電商首頁 - JAVA CORE SHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        #toast-notification {
            visibility: hidden;
            min-width: 200px;
            background-color: #111827;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px 24px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s ease, bottom 0.3s ease;
        }
        #toast-notification.show {
            visibility: visible;
            opacity: 1;
            bottom: 30px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

	<nav class="bg-white shadow min-h-16 flex flex-col lg:flex-row justify-between items-center px-4 lg:px-8 sticky top-0 z-50 mb-10 py-3 lg:py-0 gap-4">
		    <a th:href="@{/}" class="text-xl font-black text-gray-950 tracking-wider whitespace-nowrap">🛒 JAVA CORE SHOP</a>
		    
		    <form th:if="${isIndex != null && isIndex}" th:action="@{/}" method="GET" class="flex max-w-md w-full mx-0 lg:mx-4">
		        <input type="text" name="keyword" th:value="${keyword}" placeholder="輸入關鍵字（例如：耳機、咖啡機）..." 
		               class="w-full px-4 py-2 border border-gray-300 rounded-l-xl focus:outline-none focus:ring-2 focus:ring-gray-950 text-xs md:text-sm">
		        <button type="submit" class="bg-gray-950 text-white px-4 rounded-r-xl font-bold text-xs md:text-sm hover:bg-gray-800 transition-colors whitespace-nowrap">
		            搜尋
		        </button>
		    </form>

		    <div class="flex items-center">
		        <div th:if="${session.currentUser == null}">
		            <a th:href="@{/login}" class="text-xs md:text-sm font-bold bg-gray-950 text-white px-4 py-2 rounded-xl hover:bg-gray-800 transition-colors">會員登入</a>
		        </div>
		        
		        <div th:if="${session.currentUser != null}" class="flex flex-wrap items-center justify-center lg:justify-end gap-x-4 gap-y-2 text-xs md:text-sm">
		            <span class="text-gray-600 whitespace-nowrap">👋 <strong th:text="${session.currentUser.username}">使用者</strong></span>
		            
		            <a th:href="@{/product/add}" class="text-purple-600 hover:text-purple-800 font-bold transition-colors whitespace-nowrap">➕ 上架商品</a>
		            <a th:href="@{/product/manage}" class="text-gray-600 hover:text-black font-bold transition-colors whitespace-nowrap">⚙️ 商品管理</a>
		            <a th:href="@{/seller/orders}" class="text-amber-600 hover:text-amber-800 font-bold transition-colors whitespace-nowrap">📦 銷售訂單管理</a>
		            <a th:href="@{/favorites}" class="font-bold text-pink-600 hover:text-pink-800 transition-colors whitespace-nowrap">❤️ 我的收藏</a>
		            
		            <a th:href="@{/cart}" class="font-bold text-blue-600 hover:text-blue-800 whitespace-nowrap">
		                🛒 購物車(<span id="cart-count" th:text="${session.cart != null && !session.cart.isEmpty() ? #aggregates.sum(session.cart.![quantity]) : 0}">0</span>)
		            </a>
		            
		            <a th:href="@{/orders}" class="font-bold text-green-600 hover:text-green-800 whitespace-nowrap">📦 我的訂單</a>
		            <a th:href="@{/logout}" class="font-bold text-red-500 hover:text-red-700 whitespace-nowrap">登出</a>
		        </div>
		    </div>
		</nav>

    <header class="bg-gradient-to-r from-gray-900 to-gray-800 text-white py-12 px-8 text-center shadow-inner">
        <h1 class="text-3xl font-black tracking-tight mb-2">品味生活，從這裡開始</h1>
        <p class="text-gray-400 text-xs font-light">為您精選全球極簡設計、科技前沿與匠人手工單品。</p>
    </header>

    <main class="max-w-7xl w-full mx-auto px-8 py-12 flex-grow">
        
        <h2 class="text-xl font-black text-gray-950 mb-8 tracking-wide" 
            th:text="${keyword != null} ? '🔍 關於「' + ${keyword} + '」的搜尋結果' : '✨ 當季質感熱銷單品'">
            當季熱銷
        </h2>

        <div th:if="${#lists.isEmpty(products)}" class="text-center py-24 text-gray-400 text-sm">
            ❌ 找不到符合關鍵字的質感商品，換個詞試試看吧！
        </div>

        <div th:if="${!#lists.isEmpty(products)}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div th:each="product : ${products}" class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col justify-between p-4">
                <a th:href="@{'/product/detail/' + ${product.id}}" class="block h-48 w-full rounded-xl overflow-hidden bg-gray-100 mb-4">
                    <img th:src="${product.imageUrl}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                </a>
                
                <div class="flex-grow flex flex-col justify-between">
                    <div>
                        <a th:href="@{'/product/detail/' + ${product.id}}" class="hover:text-blue-600 transition-colors block">
                            <h3 class="font-bold text-gray-950 text-base line-clamp-1 mb-1" th:text="${product.name}">商品名稱</h3>
                        </a>
                        <p class="text-gray-400 text-xs line-clamp-2 mb-4 leading-relaxed" th:text="${product.description}">商品敘述</p>
                        <span class="text-xs font-bold text-gray-400 block mb-2" th:text="'庫存剩餘：' + ${product.stock} + ' 件'">庫存</span>
                    </div>
                    
                    <div class="flex justify-between items-center pt-3 border-t border-gray-50 mt-2">
                        <span class="font-black text-gray-950 text-lg" th:text="'NT$ ' + ${product.price}">NT$ 0</span>
                        
                        <button th:if="${product.stock > 0}" 
                                type="button" 
                                th:onclick="'addToCart(event, ' + ${product.id} + ', this)'"
                                class="bg-gray-950 text-white text-xs px-3 py-2 rounded-lg font-bold hover:bg-gray-800 transition-colors">
                            ＋ 購物車
                        </button>
                        
                        <span th:if="${product.stock <= 0}" class="text-xs font-bold text-red-500 px-3 py-2">
                            補貨中
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-6 text-center text-xs text-gray-400 mt-16">&copy; 2026 Java Shop System.</footer>

    <div id="toast-notification">🛒 已成功加入購物車！</div>

    <script>
        function addToCart(event, productId, btnElement) {
            if(event) event.preventDefault();

            const originalText = btnElement.innerText;
            btnElement.innerText = "處理中...";
            btnElement.disabled = true;
            btnElement.classList.add('opacity-70', 'cursor-wait');

            fetch('/cart/add?productId=' + productId, {
                method: 'POST'
            })
            .then(response => response.text())
			.then(data => {
			                const result = String(data).trim().replace(/"/g, '');
			                console.log("後端回傳的結果:", result);

			                if (result === 'NEED_LOGIN') {
			                    window.location.href = '/login';
			                } 
			                else if (result.includes('SUCCESS')) {
			                    const match = result.match(/\d+/);
			                    const newCount = match ? match[0] : '1';
			                    
			                    const cartCountBadge = document.getElementById('cart-count');
			                    if (cartCountBadge) {
			                        cartCountBadge.innerText = newCount;
			                        cartCountBadge.classList.add('text-red-500', 'scale-125');
			                        setTimeout(() => cartCountBadge.classList.remove('text-red-500', 'scale-125'), 300);
			                    }

			                    const toast = document.getElementById('toast-notification');
			                    toast.classList.add('show');
			                    setTimeout(() => { toast.classList.remove('show'); }, 2500);
			                } 
			                else {
			                    alert("❌ 操作失敗，可能是庫存不足！回傳值：" + result);
			                }
			            })
            .catch(error => {
                console.error('API Error:', error);
                alert("伺服器連線異常，請稍後再試。");
            })
            .finally(() => {
                btnElement.innerText = originalText;
                btnElement.disabled = false;
                btnElement.classList.remove('opacity-70', 'cursor-wait');
            });
        }
    </script>
</body>
</html>
