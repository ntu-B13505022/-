<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員登入 - 質感電商</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-white shadow h-16 flex justify-between items-center px-8">
        <span class="text-xl font-bold text-gray-800">🛒 電商系統</span>
        <div class="space-x-6">
            <a th:href="@{/}" class="text-gray-600 hover:text-gray-900">返回首頁</a>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white border border-gray-200 p-8 rounded-2xl shadow-sm">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-900">歡迎回來</h2>
                <p class="text-gray-500 text-sm mt-1">請輸入您的帳號密碼以繼續購物或上架</p>
            </div>

            <div th:if="${loginError}" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl">
                ⚠️ <span th:text="${loginError}">錯誤訊息</span>
            </div>

            <form th:action="@{/login}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">使用者帳號</label>
                    <input type="text" name="username" required placeholder="請輸入帳號"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">密碼</label>
                    <input type="password" name="password" required placeholder="請輸入密碼"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                </div>

                <button type="submit" class="w-full bg-gray-900 text-white py-3 rounded-xl text-sm font-bold hover:bg-gray-800 transition-colors shadow-sm mt-2">
                    安全登入
                </button>
                
                <div class="text-center mt-4">
                    <a th:href="@{/register}" class="text-xs text-blue-600 hover:underline">還沒有帳號？立即註冊一個</a>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
