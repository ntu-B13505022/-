<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的收藏清單 - Mini Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="flex items-center space-x-3 mb-8">
            <h1 class="text-2xl font-black text-gray-900">❤️ 我的收藏清單</h1>
        </div>
        
        <div th:if="${#lists.isEmpty(favorites)}" class="text-center py-16 bg-white rounded-3xl border border-gray-100 shadow-sm">
            <p class="text-gray-400 text-sm mb-4">您的收藏夾空空如也，看到喜歡的商品快把它留存下來吧！</p>
            <a href="/" class="inline-block bg-gray-950 text-white text-sm font-bold px-6 py-3 rounded-xl hover:bg-gray-800 transition-colors">去首頁逛逛</a>
        </div>

        <div th:if="${!#lists.isEmpty(favorites)}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            
            <div th:each="fav : ${favorites}" class="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow">
                <div>
                    <img th:src="${fav.product.imageUrl}" class="w-full h-48 object-cover rounded-2xl mb-4 bg-gray-100" alt="商品圖片">
                    
                    <h2 class="font-bold text-lg text-gray-900 mb-1" th:text="${fav.product.name}">商品名稱</h2>
                    
                    <p class="text-gray-500 text-xs mb-4 line-clamp-2" th:text="${fav.product.description}">商品簡介描述...</p>
                    
                    <p class="text-xl font-black text-gray-900 mb-4" th:text="'NT$ ' + ${fav.product.price}">NT$ 0</p>
                </div>
                
                <div class="flex space-x-2 pt-2 border-t border-gray-50">
                    <a th:href="@{/product/detail/{id}(id=${fav.product.id})}" class="flex-1 text-center bg-gray-950 text-white text-xs font-bold py-2.5 rounded-xl hover:bg-gray-800 transition-colors flex items-center justify-center">
                        🔍 查看詳情
                    </a>
                    
                    <form th:action="@{/favorite/remove}" method="POST">
                        <input type="hidden" name="productId" th:value="${fav.product.id}">
                        <input type="hidden" name="from" value="list">
                        <button type="submit" class="bg-red-50 text-red-500 text-xs font-bold px-4 py-2.5 rounded-xl hover:bg-red-100 transition-colors">
                            🗑️ 移除
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
