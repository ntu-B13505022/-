<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改商品資訊 - JAVA CORE SHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-white shadow h-16 flex justify-between items-center px-8 sticky top-0 z-50 mb-10">
        <a th:href="@{/}" class="text-xl font-black text-gray-950 tracking-wider">🛒 JAVA CORE SHOP</a>
        <a th:href="@{/}" class="text-sm font-bold text-gray-600 hover:text-black">返回首頁</a>
    </nav>

    <main class="max-w-2xl w-full mx-auto px-6 pb-20 flex-grow">
        <section class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-black text-gray-950 mb-6">✏️ 修改商品資訊</h1>
            
            <form th:action="@{/product/edit/{id}(id=${product.id})}" th:object="${product}" method="POST" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">商品名稱</label>
                    <input type="text" th:field="*{name}" required class="w-full p-3.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">商品描述</label>
                    <textarea th:field="*{description}" rows="4" required class="w-full p-3.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm resize-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">商品價格 (NT$)</label>
                        <input type="number" th:field="*{price}" min="0" required class="w-full p-3.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">目前庫存</label>
                        <input type="number" th:field="*{stock}" min="0" required class="w-full p-3.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">商品圖片網址 (URL)</label>
                    <input type="url" th:field="*{imageUrl}" required class="w-full p-3.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">販售狀態設定</label>
                    <select th:field="*{active}" class="w-full p-3.5 border border-gray-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm">
                        <option th:value="true">🟢 正常上架販售</option>
                        <option th:value="false">🛑 立即下架封存</option>
                    </select>
                </div>

                <div class="pt-4 flex space-x-3">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md text-sm">
                        儲存變更
                    </button>
                    <a th:href="@{/}" class="block text-center bg-gray-100 text-gray-600 py-3.5 px-6 rounded-xl font-bold hover:bg-gray-200 transition-all text-sm">
                        取消
                    </a>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
