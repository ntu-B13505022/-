<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>銷售訂單管理 - JAVA CORE SHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-white shadow min-h-16 flex flex-col lg:flex-row justify-between items-center px-4 lg:px-8 sticky top-0 z-50 mb-10 py-3 lg:py-0 gap-4">
	    <a th:href="@{/}" class="text-xl font-black text-gray-950 tracking-wider whitespace-nowrap">🛒 JAVA CORE SHOP</a>
	    
	    <div class="flex items-center">
	        <div th:if="${session.currentUser != null}" class="flex flex-wrap items-center justify-center lg:justify-end gap-x-4 gap-y-2 text-xs md:text-sm">
	            <span class="text-gray-600 whitespace-nowrap">👋 <strong th:text="${session.currentUser.username}">使用者</strong></span>
	            <a th:href="@{/product/add}" class="text-purple-600 hover:text-purple-800 font-bold transition-colors whitespace-nowrap">➕ 上架商品</a>
	            <a th:href="@{/product/manage}" class="text-gray-600 hover:text-black font-bold transition-colors whitespace-nowrap">⚙️ 商品管理</a>
	            <a th:href="@{/seller/orders}" class="text-amber-600 hover:text-amber-800 font-bold transition-colors whitespace-nowrap">📦 銷售訂單管理</a>
	            <a th:href="@{/favorites}" class="font-bold text-pink-600 hover:text-pink-800 transition-colors whitespace-nowrap">❤️ 我的收藏</a>
	            <a th:href="@{/cart}" class="font-bold text-blue-600 hover:text-blue-800 whitespace-nowrap">
	                🛒 購物車(<span id="cart-count" th:text="${session.cart != null && !session.cart.isEmpty() ? #aggregates.sum(session.cart.![quantity]) : 0}">0</span>)
	            </a>
	            <a th:href="@{/orders}" class="font-bold text-green-600 hover:text-green-800 whitespace-nowrap">📦 我的訂單</a>
	            <a th:href="@{/logout}" class="font-bold text-red-500 hover:text-red-700 whitespace-nowrap">登出</a>
	        </div>
	    </div>
	</nav>

    <main class="max-w-4xl w-full mx-auto px-6 py-8 flex-grow">
        <div class="mb-8">
            <h1 class="text-2xl font-black text-gray-950 tracking-wide">📦 銷售訂單管理</h1>
            <p class="text-xs text-gray-400 mt-1">這裡記錄了所有前來購買您商品的買家訂單明細。</p>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-20 bg-white border border-gray-200 rounded-2xl shadow-sm text-gray-400 text-sm">
            📭 目前還沒有人購買您的商品，再接再厲！
        </div>

        <div th:if="${!#lists.isEmpty(orders)}" class="space-y-6">
            <div th:each="order : ${orders}" class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
                
				<div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
				    <div>
				        <p class="text-sm font-bold text-gray-950">
				            🆔 訂單編號：<span th:text="${order.id}">000</span>
				        </p>
				        <p class="text-xs text-gray-500 mt-0.5">
				            👤 買家帳號：<span class="font-semibold text-gray-700" th:text="${order.user != null ? order.user.username : '系統會員'}">Buyer</span>
				        </p>
				        
						<div class="mt-3 pt-2 border-t border-gray-200 text-xs text-gray-600 space-y-1 bg-yellow-50/50 p-2 rounded-lg">
						    <p>📦 <strong>收件姓名：</strong><span class="text-gray-900 font-medium" th:text="${order.receiverName != null ? order.receiverName : '未填寫'}"></span></p>
						    <p>📞 <strong>聯絡電話：</strong><span class="text-gray-900 font-medium" th:text="${order.receiverPhone != null ? order.receiverPhone : '未填寫'}"></span></p>
						    <p>📍 <strong>寄送地址：</strong><span class="text-gray-900 font-medium" th:text="${order.receiverAddress != null ? order.receiverAddress : '未填寫'}"></span></p>
						</div>
				    </div>
				    
				    <div class="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold self-start sm:self-center">
				        新訂單
				    </div>
				</div>

                <div class="p-6 space-y-4">
                    <div th:each="item : ${order.orderDetails}" 
                         th:if="${item.product?.sellerId == session.currentUser?.id}" 
                         class="flex justify-between items-center py-3 border-b border-gray-100 last:border-0 last:pb-0">
                        
                        <div class="flex items-center space-x-4">
                            <img th:src="${item.product?.imageUrl}" class="w-12 h-12 object-cover rounded-xl bg-gray-100 border border-gray-100">
                            <div>
                                <p class="font-bold text-sm text-gray-950 line-clamp-1" th:text="${item.product?.name}">商品名稱</p>
                                <p class="text-xs text-gray-400 mt-0.5" th:text="'單價：NT$ ' + ${item.product?.price}">NT$ 0</p>
                            </div>
                        </div>
                        
                        <div class="text-right">
                            <p class="text-sm font-bold text-gray-900" th:text="'x ' + ${item.quantity}">x 1</p>
                            <p class="text-xs font-black text-gray-950 mt-0.5" th:text="'小計：NT$ ' + (${item.product?.price} * ${item.quantity})">NT$ 0</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-6 text-center text-xs text-gray-400 mt-16">&copy; 2026 Java Shop System.</footer>

</body>
</html>
